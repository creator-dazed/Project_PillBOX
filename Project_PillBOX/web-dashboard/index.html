<script>
/* ============================================================
   設定（自分の環境に合わせる）
   ============================================================ */
// データ取得方法: "gviz"（シートをリンク閲覧可にする／コード変更不要）
//               "gas" （GASにdoGetを足してJSON取得／シートは非公開のまま・推奨）
const MODE = "gviz";

// スプレッドシート(sensor_data)のID。gvizを使う場合に必要。
const SHEET_ID   = "1s6OVEoa-sj_WcDtYzi_TzFXMheD6-zI47n0LuB3-k9M";
const SHEET_NAME = "sensor_data";

// MODE="gas" のときに使う、GAS doGet のURL（末尾 /exec）
const GAS_GET_URL = "https://script.google.com/macros/s/XXXXX/exec";

// 飲み忘れアラートが連続して表示されたとき、通知を依頼するGAS WebアプリのURL（末尾 /exec）。
// 実際のメール/LINE送信はGAS側で行う。トークン等の機密はここには一切置かない。
const GAS_NOTIFY_URL = "https://script.google.com/macros/s/XXXXX/exec";
const NOTIFY_AFTER = 4; // 何回連続でアラートが表示されたら通知するか（更新1回＝60秒）

// 服薬時刻の設定は、sensor_data と同じ公開ブックの "setting" タブを gviz で直読みする。
// setting 列: A=key / B=hour(0-23) / C=minute(0-59) / D=label。1行目は見出し。
// 取得できない場合は下の SLOT 既定値のまま（画面は必ず表示される）。
const SETTING_SHEET = "setting";
const CONFIG_REFRESH_MS = 600000; // 服薬時刻を再取得する間隔(10分)。0で自動再取得しない。

// 服薬状況(①〜⑤)はGAS側(スクリプトプロパティ)で一元管理。全端末で同じ値になる(要GASパッチ★10)。
const GAS_METHOD_URL = "https://script.google.com/macros/s/AKfycbz0pEA1yqj_TS5LeK7c7qZXfvqxvfiyL3aOE-ZG-jCvxWnoUyVUsv6cKgSDJRcwmv1n/exec";
const METHOD_REFRESH_MS = 600000; // 服薬状況を再取得する間隔(10分)。0で自動再取得しない。

// 服薬の間隔ごとのスロット定義。
// シート2列目の timing 値("morning"/"evening") と SLOT のキーを一致させる。
const SLOT = {
  morning:{ time:"08:00" },
  noon:   { time:"12:00" },
  evening:{ time:"19:00" },
  night:  { time:"21:00" },
};
// 服薬の間隔メニュー（唯一の定義元）。
// ここに1項目足すだけで、セレクタの選択肢もカレンダーの列も自動で増えます。
//   id    : option の値（変更しない安定キー。重複不可）
//   label : 表示名（先頭の丸数字 ①②③… は並び順から自動付与されるので不要）
//   slots : [SLOTキー, 列見出し] の配列。SLOT に無いキーを使うときは SLOT 側も足す。
const METHODS = [
  { id:"1", label:"朝・昼・夕", slots:[["morning","朝"],["noon","昼"],["evening","夕"]] },
  { id:"2", label:"朝・夕",     slots:[["morning","朝"],["evening","夕"]] },
  { id:"3", label:"朝のみ",     slots:[["morning","朝"]] },
  { id:"4", label:"夕のみ",     slots:[["evening","夕"]] },
  { id:"5", label:"毎食前",     slots:[["morning","朝食前"],["noon","昼食前"],["evening","夕食前"]] },
  { id:"6", label:"寝る前",     slots:[["night","寝る前"]] },
];
const methodById = id => METHODS.find(m => m.id === id) || METHODS[0];
let methodId = METHODS[0].id; // 初期の服薬の間隔（先頭の項目）
let viewYear, viewMonth;     // 表示中の年・月(0始まり)
let RECORDS = [];            // 取得した記録 [{date,timing,status,detail}]
let recordsFromDate = null;  // 現在のRECORDSがカバーしている開始日(この日より前は未取得)
let hasPill = false;         // pill列があるか
let alertWarn = false;          // 直近renderで飲み忘れアラートを出したか
let alertMissedDays = [];       // そのときの飲み忘れ日
let missedStreak = 0;           // アラートが連続表示された回数
let notifiedThisStreak = false; // この連続表示中に通知済みか

/* ============================================================
   データ取得
   ============================================================ */
const gvizURL = (fromDate) => {
  let url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}&headers=0`;
  if(fromDate){
    // A列(日時)が指定日以降の行だけに絞り込む(全件ダウンロードを避けるため)
    const ymd = fromDate.getFullYear()+"-"+String(fromDate.getMonth()+1).padStart(2,"0")+"-"+String(fromDate.getDate()).padStart(2,"0");
    url += "&tq=" + encodeURIComponent(`select * where A >= date '${ymd}'`);
  }
  return url + "&_=" + Date.now();
};

function toDate(s){
  if(s==null||s==="") return null;
  const m = String(s).match(/^Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)$/);
  if(m) return new Date(+m[1],+m[2],+m[3],+(m[4]||0),+(m[5]||0),+(m[6]||0));
  const d = new Date(s);
  return isNaN(d) ? null : d;
}
function parseLine(line){
  const out=[]; let cur="", q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(q){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else { if(ch===','){out.push(cur);cur="";} else if(ch==='"'){q=true;} else cur+=ch; }
  }
  out.push(cur);
  return out.map(c=>c.trim());
}

// トレンドグラフ(直近6ヶ月)が必要とする最も古い日付(その月の1日)。
// 起動時・定期更新時はこの範囲だけ取得すれば十分(全件取得を避けるため)。
function computeBaseFromDate(){
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth()-6, 1);
}

async function fetchRecords(fromDate){
  if(MODE==="gas"){
    // GAS doGet が [[date,timing,status,detail], ...] のJSONを返す前提
    const res = await fetch(GAS_GET_URL + "?_=" + Date.now());
    const arr = await res.json();
    return arr.map(r=>({date:toDate(r[0]), timing:r[1], status:r[2], detail:r[3]||""}))
              .filter(r=>r.date);
  }
  // gviz CSV: 実シート(sensor_data)の列 = A:日時 / B:フタ開閉 / C:イベント/時間帯
  //   B列 = "open" / "close" / ""(空)
  //   C列 = "morning" / "evening"(開閉時) / "missed_*" / "refill_*" / "remind_*" /
  //         "device_error" / "wrong_pill" / "untouched_all_day"
  // ここから服薬カレンダー用に timing(朝/夕) と status(open/close/missed) を作る。
  // fromDate を指定すると、その日以降の行だけをサーバー側で絞り込んで取得する
  // (運用が長くなるほどsensor_dataシートの行数は増え続けるため、毎回全件取得だと
  //  どんどん遅くなる。トレンドグラフ(直近6ヶ月)+閲覧中の月をカバーする範囲だけに絞る)。
  const res = await fetch(gvizURL(fromDate));
  const text = await res.text();
  const rows = text.replace(/\r/g,"").trim().split("\n").map(parseLine);
  const records = [];
  rows.forEach(r=>{
    const dt = toDate(r[0]);
    if(!dt) return;
    const b = (r[1]||"").trim();   // フタ開閉
    const c = (r[2]||"").trim();   // 時間帯 or イベント名
    if(c.indexOf("remind_")===0) return; // 催促は表示しない

    let timing="", status="", detail="";
    if(b==="open" || b==="close"){
      timing = c;                  // "morning" / "evening"
      status = b;                  // "open" / "close"
    }else if(c.indexOf("refill_")===0){
      timing = "refill";           // お薬セット（本日カード用。カレンダー判定には使わない）
      status = "refill";
    }else if(c==="noset"){
      // 補充忘れ。[PBX-CAL-260708E] refillより後に届いた場合、本日カードのセット状態を
      // 「未セット」へ上書きするための時系列比較に使う（refillStatusToday()参照）。
      timing = "refill";
      status = "noset";
    }else if(c.indexOf("missed_")===0){
      timing = c.slice(7);         // "missed_".length===7 → "morning"/"evening"
      status = "missed";
      detail = "no_open";
    }else{
      return; // device_error / wrong_pill / untouched_all_day はスロット判定に使わない
    }
    // timing が SLOT のキーでなければ、時刻から朝夕を補完（想定外データ対策・refillは除外）
    if(timing!=="morning" && timing!=="noon" && timing!=="evening" && timing!=="night" && timing!=="refill"){
      timing = dt.getHours() < 12 ? "morning" : "evening";
    }
    records.push({date:dt, timing, status, detail});
  });
  return records;
}

/* ============================================================
   服薬時刻の取得と反映（優先1: 設定の一元化 / gviz直読み方式）
   sensor_data と同じ公開ブックの "setting" タブを gviz(CSV) で読み、
   朝/夕などの時刻をダッシュボードの SLOT に上書きする。
   setting 列: A=key / B=hour / C=minute / D=label。1行目は見出し。
   ※ time は hour/minute から自前で組み立て、0-23 / 0-59 の範囲だけ許可する。
     label(表示名)はシートから受け取らず METHODS 側のローカル定義を使う
     （遠隔シートの文字をそのまま画面へ入れないための XSS 対策）。
   ============================================================ */
const settingURL = () =>
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SETTING_SHEET)}&headers=0&_=${Date.now()}`;

async function fetchConfig(){
  const ac = new AbortController();
  const timer = setTimeout(()=>ac.abort(), 8000); // 8秒で打ち切り→既定値へフォールバック
  try{
    const res = await fetch(settingURL(), { signal: ac.signal });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    return text.replace(/\r/g,"").trim().split("\n").map(parseLine);
  }catch(e){
    console.warn("服薬時刻の取得に失敗しました（既定値で表示します）:", e);
    return null;
  }finally{
    clearTimeout(timer);
  }
}

// setting の各行(key,hour,minute,label)の time を SLOT に反映。1件でも反映したら true。
function applyConfig(rows){
  if(!Array.isArray(rows)) return false;
  let applied = 0;
  rows.forEach(r=>{
    const key  = (r[0]||"").trim();
    const hour = parseInt(r[1],10);
    const min  = parseInt(r[2],10);
    if(!key) return;
    if(isNaN(hour) || isNaN(min)) return;            // 見出し行・空行はスキップ
    if(hour<0 || hour>23 || min<0 || min>59) return; // 範囲外は無視（既定値を維持）
    const time = String(hour).padStart(2,"0") + ":" + String(min).padStart(2,"0");
    if(SLOT[key]) SLOT[key].time = time;
    else SLOT[key] = { time: time };                 // 新規キー(refill等)は time のみ
    applied++;
  });
  return applied > 0;
}

// 服薬時刻を取得して反映。rerender=true のとき、変化があれば再描画する。
async function refreshConfig(rerender){
  const changed = applyConfig(await fetchConfig());
  if(changed && rerender){ try{ render(); }catch(e){ console.error(e); } }
  return changed;
}

/* ============================================================
   判定ロジック
   ============================================================ */
const ymd = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

// 日付×timingで索引化
let IDX = {};
function buildIndex(){
  IDX = {};
  RECORDS.forEach(r=>{
    const k = ymd(r.date)+"|"+r.timing;
    (IDX[k] || (IDX[k]=[])).push(r);
  });
}

// 状態: "taken" / "missed" / "soon" / "none" / "future"
function statusFor(dateObj, slotKey){
  const slot = SLOT[slotKey];
  const key  = ymd(dateObj)+"|"+slotKey;   // 日付 × timing("morning"/"evening")
  const evs  = IDX[key] || [];
  const now  = new Date();
  const isFuture = ymd(dateObj) > ymd(now);
  if(isFuture) return "future";

  if(evs.some(e=>e.status==="missed")) return "missed";
  if(evs.some(e=>e.status==="open" || e.status==="close")) return "taken";

  // 記録なし
  const isToday = ymd(dateObj)===ymd(now);
  if(isToday && slot.time){
    const [h,mi]=slot.time.split(":").map(Number);
    const due=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,mi,0);
    if(now < due) return "soon";
  }
  return "none";
}
// カレンダーのマス（demo風の角丸塗りつぶし。色は既存のCSS変数を使用）
const MARK = { taken:["○","cs-ok"], missed:["×","cs-ng"], soon:["・","cs-soon"], none:["−","cs-none"], future:["","cs-future"] };
// 本日カードの状態ラベル（demo同様の文言）
const TC_DOSE   = { taken:"服用済", missed:"飲み忘れ", soon:"判定前", none:"−", future:"" };
const TC_REFILL = { taken:"セット済", missed:"セット忘れ", soon:"セット前", none:"セット忘れ", future:"" };

// お薬セット(refill)の本日状態。refill記録あり→セット済 / 予定時刻前→未到来 / 超過で記録なし→−
// [PBX-CAL-260708E] noset(補充忘れ)がrefillより後に届いていれば「未セット」へ上書きする
// （GAS0708.txt ★12訂正コメントの「案内起点の楽観方式・チーム決定案1」に対応）。
function refillStatusToday(){
  const now = new Date();
  const evs = (IDX[ymd(now)+"|refill"] || [])
    .filter(e=>e.status==="refill" || e.status==="noset")
    .slice()
    .sort((a,b)=>a.date-b.date); // 時系列順（古い→新しい）
  if(evs.length){
    const latest = evs[evs.length-1];
    if(latest.status==="refill") return "taken";
    if(latest.status==="noset")  return "none";   // refillより後にnosetが届いた→未セットへ上書き
  }
  const t = (SLOT.refill && SLOT.refill.time) || "20:00";
  const [h,mi] = t.split(":").map(Number);
  const due = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, mi, 0);
  return (now < due) ? "soon" : "none";
}

// 本日カードの補足文（demo風）
function todayNote(kind, st, time){
  if(kind==="refill"){
    if(st==="taken") return "セットを確認しました";
    if(st==="soon")  return time ? time+" にお知らせ予定" : "";
    return time ? time+" を過ぎました → 通知" : "セットが確認できていません"; // none=セット忘れ
  }
  if(st==="taken") return "服用を確認しました";
  if(st==="soon")  return time ? time+" にお知らせ予定" : "";
  if(st==="missed")return time ? time+" を過ぎました → 通知" : "";
  return "記録なし";
}

// 直近nヶ月の「飲み忘れ回数」（古い→新しい順）。RECORDSは全期間を保持している。
function monthlyMissedTrend(n){
  const now = new Date();
  const buckets = [];
  for(let i=n-1; i>=0; i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    buckets.push({ y:d.getFullYear(), m:d.getMonth(), label:(d.getMonth()+1)+"月", count:0 });
  }
  RECORDS.forEach(r=>{
    if(r.status!=="missed") return;
    const b = buckets.find(x=>x.y===r.date.getFullYear() && x.m===r.date.getMonth());
    if(b) b.count++;
  });
  return buckets;
}

// 月間 飲み忘れ回数の推移（CSS棒グラフ）
function renderTrend(){
  const host = document.getElementById("trend"); if(!host) return;
  const data = monthlyMissedTrend(6);
  const max = Math.max(1, ...data.map(d=>d.count));
  host.innerHTML = data.map(d=>{
    const pct = d.count ? Math.max(Math.round(d.count/max*100), 8) : 0;
    return `<div class="bar-col"><div class="bar-val">${d.count}</div>`+
           `<div class="bar-track"><div class="bar-fill" style="height:${pct}%"></div></div>`+
           `<div class="bar-lbl">${d.label}</div></div>`;
  }).join("");
  const note = document.getElementById("trendNote");
  if(note) note.textContent = "直近6ヶ月の飲み忘れ回数です。";
}

// 月間サマリー（表示中の月が対象）。通知送信件数はダッシュボードのデータからは
// 算出できない（GAS側の処理）ため項目に含めない。
function renderSummary(){
  const host = document.getElementById("summary"); if(!host) return;
  const doseKeys = methodById(methodId).slots.map(s=>s[0]); // morning/noon/evening
  const now = new Date();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  let taken=0, elapsed=0, missed=0;
  const openMin = { morning:[], noon:[], evening:[] };
  for(let d=1; d<=daysInMonth; d++){
    const dt = new Date(viewYear, viewMonth, d);
    if(ymd(dt) > ymd(now)) break;            // 未来は数えない
    doseKeys.forEach(k=>{
      const st = statusFor(dt, k);
      if(st==="taken"){ taken++; elapsed++; }
      else if(st==="missed"){ missed++; elapsed++; }
      else if(st==="none"){ elapsed++; }     // soon/futureは経過前なので除外
    });
  }
  // 平均服薬時刻(open=蓋オープンの時刻を平均)。昼(noon)はGAS側のgetTiming()が対応済みになった時点で自動的に集計される。
  RECORDS.forEach(r=>{
    if(r.date.getFullYear()!==viewYear || r.date.getMonth()!==viewMonth) return;
    if(r.status!=="open") return;
    const mm = r.date.getHours()*60 + r.date.getMinutes();
    if(r.timing==="morning") openMin.morning.push(mm);
    else if(r.timing==="noon") openMin.noon.push(mm);
    else if(r.timing==="evening") openMin.evening.push(mm);
  });
  const rate = elapsed ? Math.round(taken/elapsed*1000)/10 : null;
  const avg = arr=>{
    if(!arr.length) return "—";
    const m = Math.round(arr.reduce((a,b)=>a+b,0)/arr.length);
    return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");
  };
  const rows = [
    ["服薬率",             rate===null ? "—" : rate+"%", "ok"],
    ["飲み忘れ回数",       missed+" 回", missed>0 ? "ng" : ""],
    ["平均服薬時刻(朝)", avg(openMin.morning), ""],
    ["平均服薬時刻(昼)", avg(openMin.noon), ""],
    ["平均服薬時刻(夜)", avg(openMin.evening), ""],
  ];
  host.innerHTML = rows.map(r=>
    `<div class="sm-row"><span class="sm-k">${r[0]}</span><span class="sm-v ${r[2]}">${r[1]}</span></div>`
  ).join("");
}

/* ============================================================
   描画
   ============================================================ */
// 「2026年7月6日 月曜日」形式の日付文字列を作る(西暦4桁・月日は半角数字ゼロ埋めなし)
const WEEKDAY_LONG = ["日曜日","月曜日","火曜日","水曜日","木曜日","金曜日","土曜日"];
function formatTodayDate(d){
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${WEEKDAY_LONG[d.getDay()]}`;
}

function render(){
  const method = methodById(methodId);
  const slots  = method.slots;
  const now    = new Date();

  // 本日の日付表示(本日の服薬状況の見出し右側)
  document.getElementById("todayDate").textContent = formatTodayDate(now);

  // 月見出し
  document.getElementById("ym").textContent = `${viewYear}年 ${viewMonth+1}月`;

  // 表ヘッダ
  const head = document.getElementById("calHead");
  head.innerHTML = "<th>日付</th>" + slots.map(s=>`<th>${s[1]}</th>`).join("");

  // 表本体（その月の各日）
  const body = document.getElementById("calBody");
  body.innerHTML = "";
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const WD=["日","月","火","水","木","金","土"];
  const missedDays = [];

  for(let d=1; d<=daysInMonth; d++){
    const dt = new Date(viewYear, viewMonth, d);
    const tr = document.createElement("tr");
    if(ymd(dt)===ymd(now)) tr.className="cal-today";
    const wd = dt.getDay();
    const wdcls = wd===0?"sun":(wd===6?"sat":"");
    let dayMissed=false;
    let cells = `<td class="day ${wdcls}">${viewMonth+1}/${d}(${WD[wd]})</td>`;
    slots.forEach(s=>{
      const st = statusFor(dt, s[0]);
      if(st==="missed"){ dayMissed=true; }
      const [mk,cls]=MARK[st];
      cells += `<td class="${cls}">${mk}</td>`;
    });
    if(dayMissed) missedDays.push(`${viewMonth+1}月${d}日`);
    tr.innerHTML = cells;
    body.appendChild(tr);
  }

  // アラート
  const alertEl = document.getElementById("alert");
  if(missedDays.length){
    alertEl.className = "alert warn";
    alertEl.innerHTML = `<strong>${missedDays.join("、")}</strong>に飲み忘れがあります。`;
    alertWarn = true; alertMissedDays = missedDays.slice();
  }else{
    alertEl.className = "alert ok";
    alertEl.innerHTML = `${viewYear}年${viewMonth+1}月<br class="sp-br">飲み忘れの記録はありません。`;
    alertWarn = false; alertMissedDays = [];
  }

  // 本日の服薬状況(服薬設定(①〜⑤)のスロットに連動。常に「今日」基準で表示。最後に必ずお薬のセットを追加)
  const todayEl = document.getElementById("today");
  todayEl.innerHTML = "";
  const cards = slots.map(s => ({ key:s[0], name:`${s[1]}の服用`, kind:"dose" }));
  cards.push({ key:"refill", name:"お薬のセット", kind:"refill" });
  // ①⑤(服薬3枠+お薬のセットの計4枚)は横4列で折り返さず表示。それ以外はカード枚数分の列数。
  todayEl.style.gridTemplateColumns = `repeat(${Math.min(cards.length,4)},1fr)`;
  cards.forEach(c=>{
    const st    = (c.kind==="refill") ? refillStatusToday() : statusFor(now, c.key);
    const lbl   = (c.kind==="refill") ? (TC_REFILL[st]||"−") : (TC_DOSE[st]||"−");
    const time  = (SLOT[c.key] && SLOT[c.key].time) || "";
    // 色クラス: 通常は状態名をそのまま使う。ただしお薬のセットのnone(時刻超過・記録なし)は
    //   「セット忘れ」として飲み忘れと同じ赤(missed)で目立たせる。
    let stcls = (st==="taken")?"taken":(st==="missed")?"missed":(st==="soon")?"soon":"none";
    if(c.kind==="refill" && st==="none") stcls = "missed";
    const div   = document.createElement("div"); div.className="tcard";
    div.innerHTML = `<div class="nm">${c.name}</div>`+
                    `<div class="st ${stcls}">${lbl}</div>`+
                    `<div class="tnote">${todayNote(c.kind, st, time)}</div>`;
    todayEl.appendChild(div);
  });

  // 右カラム（月間 推移・サマリー）。1つが失敗しても他を止めない。
  try{ renderTrend(); }catch(e){ console.error(e); }
  try{ renderSummary(); }catch(e){ console.error(e); }
}

/* ============================================================
   通知（飲み忘れアラートが連続 NOTIFY_AFTER 回 表示されたら GAS 経由で送信）
   ※ load() は60秒ごとに走る。連続回数は画面を開いている間だけ数える。
   ============================================================ */
function checkNotify(){
  if(alertWarn){
    missedStreak++;
    if(missedStreak >= NOTIFY_AFTER && !notifiedThisStreak){
      notifiedThisStreak = true;          // この連続中の二重送信を防ぐ
      notifyGAS(alertMissedDays, missedStreak);
    }
  }else{
    missedStreak = 0;                      // アラートが消えたらリセット
    notifiedThisStreak = false;
  }
}

async function notifyGAS(missedDays, count){
  // URL未設定なら何もしない（誤送信防止）
  if(!GAS_NOTIFY_URL || GAS_NOTIFY_URL.indexOf("XXXXX") !== -1) return;
  try{
    // GASのCORSプリフライトを避けるため text/plain + no-cors のPOST（応答は読まない）
    await fetch(GAS_NOTIFY_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "notify",
        reason: "missed_alert_streak",
        message: "【見守り通知】 お薬の飲み忘れが2日連続で記録されました。ご本人との連絡が取れるかご確認ください。",
        count: count,
        days: missedDays,
        ts: Date.now()
      })
    });
    console.log("通知をGASへ送信しました（連続" + count + "回）");
  }catch(e){
    console.error("通知の送信に失敗しました:", e);
  }
}

/* ============================================================
   起動・イベント
   ============================================================ */

async function load(){
  const err=document.getElementById("err");
  try{
    // 定期更新は「直近6ヶ月+閲覧中の月」をカバーする範囲だけ取り直す(全件取得を避ける)
    const from = new Date(Math.min(computeBaseFromDate().getTime(), new Date(viewYear, viewMonth, 1).getTime()));
    recordsFromDate = from;
    RECORDS = await fetchRecords(from);
    buildIndex();
    err.textContent="";
    render();
    checkNotify();   // 更新のたびにアラート連続表示回数を判定
  }catch(e){
    err.textContent = "データを取得できませんでした。SHEET_ID・シートの共有設定(gvizはリンク閲覧可が必要)をご確認ください。";
    console.error(e);
  }
}

// 前月/翌月ボタン用: 既に取得済みの範囲内であれば再取得せずそのまま再描画(高速)。
// 範囲外(取得済みより古い月)へ移動した場合だけ、その月を含む範囲で取り直す。
async function ensureRecordsForView(){
  const need = new Date(Math.min(computeBaseFromDate().getTime(), new Date(viewYear, viewMonth, 1).getTime()));
  if(!recordsFromDate || need < recordsFromDate){
    await load();
  }else{
    render();
  }
}

// METHODS からセレクタの選択肢を自動生成（並び順で丸数字を付与）
function circledNo(i){
  return i < 20 ? String.fromCharCode(0x2460 + i) : "(" + (i + 1) + ")";
}
// 服薬状況(①〜⑤)は管理画面(admin.html)で選ぶ。GAS側(スクリプトプロパティ)から取得し、
// 通信に失敗した場合だけ、直近に取得できた値(localStorageのキャッシュ)を使う。
// 他タブ/他ウィンドウ(同一ブラウザ)の変更はstorageイベントで即時同期(補助的な高速経路)。
window.addEventListener("storage", e=>{
  if(e.key === "pillbox_method" && e.newValue){
    methodId = e.newValue;
    render();
  }
});
async function refreshMethod(){
  if(!GAS_METHOD_URL) return;
  try{
    const res = await fetch(GAS_METHOD_URL + "?action=method&_=" + Date.now());
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const id = String(data && data.methodId || "");
    if(METHODS.some(m=>m.id===id)){
      methodId = id;
      localStorage.setItem("pillbox_method", id); // オフライン時のフォールバック用にキャッシュ
    }
  }catch(e){
    console.warn("服薬状況の取得に失敗(直近のキャッシュ値を使用):", e);
  }
}
document.getElementById("prev").addEventListener("click", ()=>{ viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} ensureRecordsForView(); });
document.getElementById("next").addEventListener("click", ()=>{ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} ensureRecordsForView(); });

(async function init(){
  const n=new Date(); viewYear=n.getFullYear(); viewMonth=n.getMonth();
  // まずキャッシュ(localStorage)を仮値として即表示 → 通信が終わり次第、必要なら差し替える
  methodId = localStorage.getItem("pillbox_method") || METHODS[0].id;

  // 起動時の3つの通信(服薬状況・服薬時刻・記録データ)は互いに依存しないため、
  // 直列(1つ終わってから次へ)ではなく並列で実行し、起動を速くする。
  // (直列だと合計待ち時間になるが、並列なら一番遅い1つの時間で済む)
  const err = document.getElementById("err");
  const from = computeBaseFromDate(); // 起動直後は必ず今月を含むので、基準範囲(直近6ヶ月)でよい
  recordsFromDate = from;
  // [PBX-CAL-260708F] 服薬状況(GAS)・服薬時刻(gviz)は、既にキャッシュ/既定値による
  // 即時フォールバックを持っているため、記録データの取得を待たずに背景で取得し、
  // 届き次第 render() し直す(GASのコールドスタート等で待たされないようにするため)。
  refreshMethod().then(render);
  refreshConfig(false).then(render);

  try{
    RECORDS = await fetchRecords(from);
    buildIndex();
    err.textContent = "";
  }catch(e){
    console.error(e);
    err.textContent = "データを取得できませんでした。SHEET_ID・シートの共有設定(gvizはリンク閲覧可が必要)をご確認ください。";
  }
  render();
  checkNotify();

  setInterval(load, 30000); // 30秒ごとに更新(直近6ヶ月+閲覧中の月の範囲だけ取り直す)
  // 管理画面(setting シート / GAS)で内容が変わっても反映できるよう、定期的に取り直す
  if(CONFIG_REFRESH_MS > 0) setInterval(()=>refreshConfig(true), CONFIG_REFRESH_MS);
  if(METHOD_REFRESH_MS > 0) setInterval(async ()=>{ await refreshMethod(); render(); }, METHOD_REFRESH_MS);
})();
</script>
