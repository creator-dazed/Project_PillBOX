  <link rel="icon" href="favicon.ico">

<body>
  <!-- 簡易パスワードゲート(ソフトな抑止) -->
  <div id="gate" class="gate">
    <div class="gate-box">
      <h2 class="gate-ttl">管理画面</h2>
      <p class="gate-note">パスワードを入力してください</p>
      <input id="gatePass" type="password" autocomplete="off" placeholder="パスワード">
      <button id="gateBtn" type="button" class="btn-primary">開く</button>
      <p class="save-msg ng" id="gateMsg"></p>
    </div>
  </div>

  <header class="hd">
    <img class="logo" src="pillbox_logo_b.png" alt="PiLLBOX">
    <div class="hd-text">
      <h1>管理画面</h1>
      <p class="sub">服薬設定とお知らせ時刻などを設定します。</p>
    </div>
  </header>

  <!-- 服薬設定 -->
  <section class="panel">
    <h2 class="panel-ttl">服薬設定</h2>
    <div class="interval-ctrl">
      <label for="method">服薬状況を選んでください</label>
      <select id="method"></select>
    </div>
    <p class="panel-note">設定が保存されるとお薬カレンダーに即時反映されます。</p>
    <p class="save-msg" id="methodMsg"></p>
  </section>

  <!-- お知らせ時刻の設定 (setting シートの hour/minute) -->
  <section class="panel time-panel">
    <h2 class="panel-ttl tp-title">お知らせ時刻の設定</h2>
    <button id="openTimeModal" class="btn-primary tp-btn" type="button">⚙ 時刻設定</button>
    <div id="timeSummary" class="time-summary tp-summary">
      <p class="panel-note" id="timeLoad">現在の設定を読み込み中…</p>
    </div>
  </section>

  <!-- 服薬時刻の設定モーダル -->
  <div id="timeModalOverlay" class="modal-overlay">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="timeModalTtl">
      <h2 id="timeModalTtl" class="modal-ttl">服薬時刻の設定</h2>
      <div id="timeRows" class="time-rows"></div>

      <div class="pass-row">
        <label for="token">パスワード</label>
        <input id="token" type="password" autocomplete="off" placeholder="パスワードを入力して下さい">
      </div>
      <p class="save-msg" id="timeMsg"></p>

      <div class="modal-btn-row">
        <button id="cancelTimeModal" class="btn-plain" type="button">キャンセル</button>
        <button id="save" class="btn-primary" type="button">保存</button>
      </div>
    </div>
  </div>

  <!-- パスワードの変更 -->
  <section class="panel">
    <h2 class="panel-ttl">パスワードの変更</h2>
    <p class="panel-note">
      この管理画面を開くためのパスワードを変更します。
    </p>
    <div class="pass-row">
      <label for="curPass">現在のパスワード</label>
      <input id="curPass" type="password" autocomplete="off">
    </div>
    <div class="pass-row">
      <label for="newPass">新しいパスワード</label>
      <input id="newPass" type="password" autocomplete="off">
    </div>
    <div class="pass-row">
      <label for="newPass2">新しいパスワード(確認)</label>
      <input id="newPass2" type="password" autocomplete="off">
    </div>
    <div class="btn-row">
      <button id="changePassBtn" class="btn-primary" type="button">変更する</button>
    </div>
    <p class="save-msg" id="passMsg"></p>
  </section>

  <!-- 設定のリセット -->
  <section class="panel">
    <h2 class="panel-ttl">設定のリセット</h2>

    <div class="reset-block">
      <p class="panel-note">
        本日分の服薬記録(服用済み・飲み忘れ・お薬のセット済みなど)だけを削除します。
        <strong style="color:var(--ng)">この変更は元に戻せません。</strong>
      </p>
      <div class="btn-row">
        <button id="resetTodayBtn" class="btn-plain" type="button">当日分をリセットする</button>
      </div>
      <p class="save-msg" id="resetTodayMsg"></p>
    </div>

    <div class="reset-block">
      <p class="panel-note">
        すべて初期状態に戻します。<strong style="color:var(--ng)">この変更は元に戻せません。</strong>
      </p>
      <div class="btn-row">
        <button id="resetAllBtn" class="btn-plain" type="button">すべての設定をリセットする</button>
      </div>
      <p class="save-msg" id="resetMsg"></p>
    </div>
  </section>

  <footer class="foot">
    <a class="admin-link" href="index.html">← ダッシュボードへ戻る</a>
  </footer>

  <script>
/* ============================================================
   管理画面 設定
   ============================================================ */
// setting を読むためのブックID(ダッシュボードと同じ・gvizで読み取り専用)
const SHEET_ID      = "1s6OVEoa-sj_WcDtYzi_TzFXMheD6-zI47n0LuB3-k9M";
const SETTING_SHEET = "setting";

// setting へ「書き込む」ためのGAS WebアプリURL(末尾 /exec)。
// ★ 現行GASには書き込み口が無いため、GAS側に action="setConfig" を追加し、
//   このURLを設定するまで保存はできません(読み込みだけ動きます)。
const GAS_SET_URL = "https://script.google.com/macros/s/AKfycbz0pEA1yqj_TS5LeK7c7qZXfvqxvfiyL3aOE-ZG-jCvxWnoUyVUsv6cKgSDJRcwmv1n/exec";

// 時刻設定のラベル(setting のキー→表示名)。時刻はキー単位で1つ(方式が変わっても共有)。
const KEY_LABELS = {
  morning:"朝のお知らせ",
  noon:   "昼のお知らせ",
  evening:"夕のお知らせ",
  night:  "寝る前のお知らせ",
  refill: "お薬のセット",
};

// 服用の間隔メニュー(ダッシュボードと同じ定義。将来は共通化したい)
const METHODS = [
  { id:"1", label:"朝・昼・夕", slots:[["morning","朝"],["noon","昼"],["evening","夕"]] },
  { id:"2", label:"朝・夕",     slots:[["morning","朝"],["evening","夕"]] },
  { id:"3", label:"朝のみ",     slots:[["morning","朝"]] },
  { id:"4", label:"夕のみ",     slots:[["evening","夕"]] },
  { id:"5", label:"毎食前",     slots:[["morning","朝食前"],["noon","昼食前"],["evening","夕食前"]] },
  { id:"6", label:"寝る前",     slots:[["night","寝る前"]] },
];

// 選択中の方式が使う服薬キー(重複除去)＋常に refill。これで時刻入力の数が方式に連動する。
function timeKeysForMethod(id){
  const m = METHODS.find(x=>x.id===id) || METHODS[0];
  const keys = [];
  m.slots.forEach(s=>{ if(keys.indexOf(s[0])<0) keys.push(s[0]); });
  keys.push("refill"); // お薬のセットは常に表示
  return keys;
}
const circledNo = i => "①②③④⑤⑥⑦⑧⑨⑩".charAt(i) || (i+1)+".";

/* ============================================================
   服薬状況(①〜⑤): GAS側(スクリプトプロパティ)で一元管理。全端末で同じ値になる。
   ============================================================ */
function buildMethodOptions(){
  const sel = document.getElementById("method");
  sel.innerHTML = METHODS.map((m,i)=>`<option value="${m.id}">${circledNo(i)} ${m.label}</option>`).join("");
  sel.value = localStorage.getItem("pillbox_method") || METHODS[0].id; // GASから取得できるまでの仮値
}
async function loadMethodFromGAS(){
  if(!GAS_SET_URL) return;
  try{
    const res = await fetch(GAS_SET_URL + "?action=method&_=" + Date.now());
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const id = String(data && data.methodId || "");
    if(METHODS.some(m=>m.id===id)){
      document.getElementById("method").value = id;
      localStorage.setItem("pillbox_method", id);
      renderTimeInputs();
      renderTimeSummary();
    }
  }catch(e){
    console.warn("服薬状況の取得に失敗(ローカルの値を表示中):", e);
  }
}
document.getElementById("method").addEventListener("change", async e=>{
  const id = e.target.value;
  const token = sessionStorage.getItem("pillbox_admin_token");
  if(!token){ flash("methodMsg", "パスワードの確認が取れていません。もう一度ログインし直してください。", false); return; }
  flash("methodMsg", "保存中…", true);
  try{
    const data = await gasPost({ action:"setMethod", token, methodId:id });
    if(data && data.ok){
      localStorage.setItem("pillbox_method", id); // storage イベントで同一ブラウザ内のダッシュボードにも即時反映
      renderTimeInputs();                          // ★ 方式に応じて時刻入力の数を切り替え(連動・モーダル内)
      renderTimeSummary();                         // パネル上部のサマリーも同時に更新
      flash("methodMsg", "保存しました(全ての端末に反映されます)。", true);
      return;
    }
    flash("methodMsg", "保存できませんでした。時間をおいて再試行してください。", false);
  }catch(err){
    console.warn("服薬状況の保存に失敗:", err);
    flash("methodMsg", "保存できませんでした(通信エラー)。時間をおいて再試行してください。", false);
  }
});

/* ============================================================
   お知らせ時刻: 読み込み(gviz) → 入力欄へ
   ============================================================ */
function parseLine(line){
  const out=[]; let cur="", q=false;
  for(let i=0;i<line.length;i++){ const ch=line[i];
    if(q){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else { if(ch===','){out.push(cur);cur="";} else if(ch==='"'){q=true;} else cur+=ch; } }
  out.push(cur); return out.map(c=>c.trim());
}
const settingURL = () =>
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SETTING_SHEET)}&headers=0&_=${Date.now()}`;

let currentTimes = {};   // key -> {h,m} 直近にシートから読めた値のキャッシュ

async function loadTimes(){
  const summary = document.getElementById("timeSummary");
  const load = document.getElementById("timeLoad");
  if(load) load.textContent = "現在の設定を読み込み中…";
  try{
    const res = await fetch(settingURL());
    if(!res.ok) throw new Error("HTTP " + res.status);
    const rows = (await res.text()).replace(/\r/g,"").trim().split("\n").map(parseLine);
    const cur = {};
    rows.forEach(r=>{
      const key = (r[0]||"").trim();
      const h = parseInt(r[1],10), m = parseInt(r[2],10);
      if(key && !isNaN(h) && !isNaN(m)) cur[key] = { h, m };
    });
    currentTimes = cur;
  }catch(e){
    console.warn("設定の読み込みに失敗:", e);
    summary.innerHTML = `<p class="err">現在の設定を読み込めませんでした。シートの共有設定(gvizはリンク閲覧可が必要)をご確認ください。</p>`;
    return;
  }
  renderTimeSummary();
  renderTimeInputs();
}

// 選択中の方式に合わせて時刻入力欄を組み立てる(値は直近キャッシュから)。方式連動の本体。モーダル内に描画。
// ②【260708】マウスで操作しやすいよう、type="time"から「時」「分」の2つのプルダウン(select)に変更。
//    選択肢は00〜23/00〜59の固定値のみを生成するため、無効な時刻(88時など)を入力できない(入力検証が不要=安全)。
function renderTimeInputs(){
  const box  = document.getElementById("timeRows");
  const id   = document.getElementById("method").value || (METHODS[0] && METHODS[0].id);
  const keys = timeKeysForMethod(id);
  box.innerHTML = keys.map(key=>{
    const c  = currentTimes[key] || {};
    const hh = (c.h!=null) ? c.h : 0;
    const mm = (c.m!=null) ? c.m : 0;
    const label = KEY_LABELS[key] || key;
    // 時(0-23)・分(0-59)の選択肢を数値から生成。selected属性で現在値を反映。
    let hourOpts = "";
    for(let i=0;i<24;i++){
      const v = String(i).padStart(2,"0");
      hourOpts += `<option value="${i}"${i===hh?" selected":""}>${v}</option>`;
    }
    let minOpts = "";
    for(let i=0;i<60;i++){
      const v = String(i).padStart(2,"0");
      minOpts += `<option value="${i}"${i===mm?" selected":""}>${v}</option>`;
    }
    return `<div class="time-row" data-key="${key}">
      <span class="tr-label">${label}</span>
      <span class="tr-picker">
        <select class="t-hour">${hourOpts}</select>
        <span class="tr-colon">:</span>
        <select class="t-min">${minOpts}</select>
      </span>
    </div>`;
  }).join("");
}

// パネル上部の簡易サマリー(読み取り専用の表示。モーダルを開かなくても現在値が一目でわかる)
function renderTimeSummary(){
  const host = document.getElementById("timeSummary");
  const id   = document.getElementById("method").value || (METHODS[0] && METHODS[0].id);
  const keys = timeKeysForMethod(id);
  host.innerHTML = keys.map(key=>{
    const c = currentTimes[key] || {};
    const hh = (c.h!=null) ? String(c.h).padStart(2,"0") : "--";
    const mm = (c.m!=null) ? String(c.m).padStart(2,"0") : "--";
    const label = KEY_LABELS[key] || key;
    return `<span class="ts-chip">${label} <strong>${hh}:${mm}</strong></span>`;
  }).join("");
}

/* ============================================================
   共通: GASへのPOST送信(setConfig / verifyToken / changeToken で共用)
   ============================================================ */
async function gasPost(body){
  const res = await fetch(GAS_SET_URL, {
    method:"POST",
    headers:{ "Content-Type":"text/plain;charset=utf-8" }, // preflightを避ける(GASはpostData.contentsをJSON解釈)
    body: JSON.stringify(body)
  });
  let data = null; try{ data = await res.json(); }catch(_){}
  return data;
}

/* ============================================================
   お知らせ時刻: 保存(GASへPOST)
   ============================================================ */
function collectSlots(){
  const rows = document.querySelectorAll("#timeRows .time-row");
  const slots = [];
  let bad = false;
  rows.forEach(row=>{
    const key = row.getAttribute("data-key");
    // ② プルダウン(select)の値は0-23/0-59の固定選択肢のみなので、値は常に正常範囲。
    //    それでも念のためサーバ側(GAS setConfig_)でも範囲を再検証している(多層防御)。
    const h = parseInt(row.querySelector(".t-hour").value, 10);
    const m = parseInt(row.querySelector(".t-min").value, 10);
    if(isNaN(h) || h<0 || h>23 || isNaN(m) || m<0 || m>59){ bad = true; return; }
    slots.push({ key, hour:h, minute:m, label: KEY_LABELS[key] || key });
  });
  return { slots, bad };
}

document.getElementById("save").addEventListener("click", async ()=>{
  const { slots, bad } = collectSlots();
  if(bad){ flash("timeMsg", "時刻の形式が正しくありません。入力欄からやり直してください。", false); return; }
  const token = document.getElementById("token").value.trim();
  if(!token){ flash("timeMsg", "パスワードを入力してください。", false); return; }
  if(!GAS_SET_URL){
    flash("timeMsg", "保存先(GASの書き込みURL)が未設定です。GAS側にsetConfigを追加してください。", false); return;
  }
  flash("timeMsg", "送信中…", true);
  try{
    const data = await gasPost({ action:"setConfig", token, slots });
    if(data && data.ok){ flash("timeMsg", "保存しました。", true); setTimeout(()=>{ loadTimes(); closeTimeModal(); }, 1200); return; }
    if(data && data.error){ flash("timeMsg", "保存できませんでした: " + data.error, false); return; }
    flash("timeMsg", "送信しました。反映まで数分かかる場合があります。", true);
    setTimeout(()=>{ loadTimes(); closeTimeModal(); }, 2000);
  }catch(e){
    // fetchが例外でも書き込み自体は届いていることが多い。誤って「失敗」と断定しない。
    console.warn("応答は確認できませんでした:", e);
    flash("timeMsg", "送信しました(応答は確認できません)。数分後に再度開いて反映をご確認ください。", true);
    setTimeout(()=>{ loadTimes(); closeTimeModal(); }, 2000);
  }
});

/* ============================================================
   服薬時刻の設定モーダル 開閉
   ============================================================ */
function openTimeModal(){
  document.getElementById("token").value = sessionStorage.getItem("pillbox_admin_token") || "";
  flash("timeMsg", "", true);
  loadTimes(); // 開くたびに最新の値を読み込み直す
  document.getElementById("timeModalOverlay").classList.add("is-open");
}
function closeTimeModal(){
  document.getElementById("timeModalOverlay").classList.remove("is-open");
}
document.getElementById("openTimeModal").addEventListener("click", openTimeModal);
document.getElementById("cancelTimeModal").addEventListener("click", closeTimeModal);
document.getElementById("timeModalOverlay").addEventListener("click", e=>{
  if(e.target.id === "timeModalOverlay") closeTimeModal(); // 背景クリックで閉じる
});
document.addEventListener("keydown", e=>{
  if(e.key === "Escape" && document.getElementById("timeModalOverlay").classList.contains("is-open")) closeTimeModal();
});

/* ============================================================
   共通: メッセージ表示
   ============================================================ */
function flash(id, text, ok){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = "save-msg " + (ok ? "ok" : "ng");
}

/* ============================================================
   パスワードゲート
   ※ パスワード(ADMIN_TOKEN)はGAS側のスクリプトプロパティで一元管理します。
     このページを開く時・時刻設定を保存する時・パスワードを変更する時、
     すべて同じ1つのパスワードで、GASへ問い合わせて照合します。
   ※ 画面を隠しているだけのUI(devtoolsで無理やり表示すること自体は防げません)。
     実際にデータを読み書きする操作(保存・変更)は、その都度GAS側で
     パスワードを検証しているため、正しいパスワードを知らない限り実行できません。
   ============================================================ */
async function verifyToken(token){
  if(!GAS_SET_URL) return { ok:false, networkError:true };
  try{
    const data = await gasPost({ action:"verifyToken", token });
    if(data && typeof data.ok === "boolean") return data;
    return { ok:false, networkError:true }; // 応答を解釈できない
  }catch(e){
    console.warn("パスワード確認に失敗:", e);
    return { ok:false, networkError:true };
  }
}
let appStarted = false;
function startApp(){
  if(appStarted) return;
  appStarted = true;
  buildMethodOptions();
  loadMethodFromGAS();
  loadTimes();
}
function unlock(){
  document.getElementById("gate").style.display = "none";
  startApp();
}
async function tryUnlock(){
  const pass = document.getElementById("gatePass").value;
  const btn  = document.getElementById("gateBtn");
  const msg  = document.getElementById("gateMsg");
  if(!pass){ msg.textContent = "パスワードを入力してください。"; return; }
  btn.disabled = true;
  msg.textContent = "確認中…";
  const result = await verifyToken(pass);
  btn.disabled = false;
  if(result.ok){
    sessionStorage.setItem("pillbox_admin_token", pass); // このセッション中は再入力不要(時刻設定モーダルにも自動入力)
    unlock();
  }else if(result.networkError){
    msg.textContent = "確認できませんでした(通信エラー)。時間をおいて再試行してください。";
  }else{
    msg.textContent = "パスワードが違います。";
  }
}
document.getElementById("gateBtn").addEventListener("click", tryUnlock);
document.getElementById("gatePass").addEventListener("keydown", e=>{ if(e.key === "Enter") tryUnlock(); });

/* ============================================================
   パスワードの変更(GAS側のスクリプトプロパティを書き換える。全端末に反映)
   ============================================================ */
document.getElementById("changePassBtn").addEventListener("click", async ()=>{
  const cur = document.getElementById("curPass").value;
  const n1  = document.getElementById("newPass").value;
  const n2  = document.getElementById("newPass2").value;

  if(!cur){ flash("passMsg", "現在のパスワードを入力してください。", false); return; }
  if(!n1){ flash("passMsg", "新しいパスワードを入力してください。", false); return; }
  if(n1 !== n2){ flash("passMsg", "新しいパスワード(確認)が一致しません。", false); return; }
  if(!GAS_SET_URL){ flash("passMsg", "保存先(GASの書き込みURL)が未設定です。", false); return; }

  flash("passMsg", "送信中…", true);
  let data;
  try{
    data = await gasPost({ action:"changeToken", oldToken:cur, newToken:n1 });
  }catch(e){
    console.warn("パスワード変更に失敗:", e);
    flash("passMsg", "送信できませんでした(通信エラー)。時間をおいて再試行してください。", false);
    return;
  }
  if(data && data.ok){
    sessionStorage.setItem("pillbox_admin_token", n1); // このセッションの認証状態も新しいパスワードに更新
    document.getElementById("curPass").value  = "";
    document.getElementById("newPass").value  = "";
    document.getElementById("newPass2").value = "";
    const weak = n1.length < 4;
    flash("passMsg",
      "変更しました。次回からは全ての端末・ブラウザで新しいパスワードが使えます。"
      + (weak ? " ※4文字未満は推測されやすいため、できれば長いものに変更してください。" : ""),
      true);
    return;
  }
  if(data && data.error === "unauthorized"){ flash("passMsg", "現在のパスワードが違います。", false); return; }
  flash("passMsg", "変更できませんでした。時間をおいて再試行してください。", false);
});
/* ============================================================
   設定のリセット
   ・服薬状況(method)・服薬時刻: GAS経由で既定値に書き戻す(全端末に反映)
   ・ログイン状態: このブラウザのみ初期化
   ============================================================ */
const DEFAULT_TIMES = [                 // ★リセット時の初期値(JuN指定・2026-07-04。nightは⑥追加時にClaudeが21:00を仮設定)
  { key:"morning", hour:7,  minute:0  },
  { key:"noon",    hour:12, minute:0  },
  { key:"evening", hour:18, minute:0  },
  { key:"night",   hour:21, minute:0  },
  { key:"refill",  hour:20, minute:0  },
];
const DEFAULT_METHOD_ID = METHODS[0].id; // ①

// 当日分のみリセット(服薬状況・時刻設定には触れない。sensor_dataの「今日」の行だけをGAS側で削除)
document.getElementById("resetTodayBtn").addEventListener("click", async ()=>{
  const ok = confirm("本日分の服薬記録を削除します。この変更は元に戻せません。よろしいですか?");
  if(!ok) return;
  const token = sessionStorage.getItem("pillbox_admin_token");
  if(!token){ flash("resetTodayMsg", "パスワードの確認が取れていません。もう一度ログインし直してください。", false); return; }
  if(!GAS_SET_URL){ flash("resetTodayMsg", "保存先(GASの書き込みURL)が未設定です。", false); return; }

  flash("resetTodayMsg", "リセット中…", true);
  try{
    const data = await gasPost({ action:"resetToday", token });
    if(!(data && data.ok)){
      flash("resetTodayMsg", "当日分のリセットに失敗しました。時間をおいて再試行してください。", false);
      return;
    }
    flash("resetTodayMsg", `当日分をリセットしました(削除件数: ${data.deleted}件)。ダッシュボードを開くと本日の記録が「記録なし」に戻っています。`, true);
  }catch(e){
    console.warn("当日分のリセットに失敗:", e);
    flash("resetTodayMsg", "当日分のリセットに失敗しました(通信エラー)。時間をおいて再試行してください。", false);
  }
});

document.getElementById("resetAllBtn").addEventListener("click", async ()=>{
  const ok = confirm("すべて初期状態に戻します。この変更は元に戻せません。よろしいですか?");
  if(!ok) return;
  const token = sessionStorage.getItem("pillbox_admin_token");
  if(!token){ flash("resetMsg", "パスワードの確認が取れていません。もう一度ログインし直してください。", false); return; }
  if(!GAS_SET_URL){ flash("resetMsg", "保存先(GASの書き込みURL)が未設定です。", false); return; }

  flash("resetMsg", "リセット中…", true);
  const slots = DEFAULT_TIMES.map(s => ({ key:s.key, hour:s.hour, minute:s.minute, label: KEY_LABELS[s.key] || s.key }));
  try{
    const data = await gasPost({ action:"setConfig", token, slots });
    if(!(data && data.ok)){
      flash("resetMsg", "時刻のリセットに失敗しました。時間をおいて再試行してください。", false);
      return;
    }
    const methodData = await gasPost({ action:"setMethod", token, methodId: DEFAULT_METHOD_ID });
    if(!(methodData && methodData.ok)){
      flash("resetMsg", "服薬状況のリセットに失敗しました。時間をおいて再試行してください。", false);
      return;
    }
  }catch(e){
    console.warn("リセットに失敗:", e);
    flash("resetMsg", "リセットに失敗しました(通信エラー)。時間をおいて再試行してください。", false);
    return;
  }
  localStorage.removeItem("pillbox_method");
  sessionStorage.removeItem("pillbox_admin_token");
  flash("resetMsg", "リセットしました(時刻は朝7:00・昼12:00・夕18:00・セット20:00に戻りました)。まもなく画面を再読み込みします…", true);
  setTimeout(()=>location.reload(), 1500);
});

const savedToken = sessionStorage.getItem("pillbox_admin_token");
if(savedToken){
  document.getElementById("gate").style.display = "none";
  startApp();
}else{
  document.getElementById("gatePass").focus();
}
